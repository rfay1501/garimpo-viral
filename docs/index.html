<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Garimpo Viral — YouTube</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #141820;
    --panel-hi: #1c2230;
    --border: #262c3a;
    --text: #e8ebf1;
    --text-dim: #8b93a7;
    --accent: #7c5cff;
    --accent-2: #39d98a;
    --warn: #ff8a5c;
    --danger: #ff5c7a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.4;
  }
  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  header h1 { margin: 0; font-size: 22px; }
  header .sub { color: var(--text-dim); font-size: 13px; margin-top: 4px; }
  .meta { color: var(--text-dim); font-size: 13px; text-align: right; }
  .filters {
    padding: 20px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .filters label { font-size: 12px; color: var(--text-dim); display:flex; flex-direction:column; gap:4px; }
  .filters select, .filters input[type="range"], .filters input[type="text"] {
    background: var(--panel-hi);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
    min-width: 120px;
  }
  .filters .chip-row { display:flex; gap:6px; flex-wrap:wrap; }
  .chip {
    padding: 4px 10px;
    background: var(--panel-hi);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .chip.active { background: var(--accent); color:#fff; border-color: var(--accent); }
  main {
    padding: 24px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s;
    display: flex;
    flex-direction: column;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .thumb { position: relative; padding-top: 56.25%; background: #000; }
  .thumb img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
  .badge-score {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.8);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-weight: 700;
    font-size: 13px;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .badge-score.hi { color: var(--accent-2); border-color: var(--accent-2); }
  .badge-score.mid { color: var(--warn); border-color: var(--warn); }
  .badge-duration {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.85);
    color: #fff;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
  }
  .badge-faceless {
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--accent-2);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .body { padding: 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .title {
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    line-height: 1.35;
    text-decoration: none;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .title:hover { color: var(--accent); }
  .meta-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-dim);
  }
  .chip-tag {
    background: var(--panel-hi);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
  }
  .stats {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  .stats b { color: var(--text); }
  .stats .views { color: var(--accent-2); }
  .actions {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .btn {
    flex: 1;
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--panel-hi);
    color: var(--text);
    cursor: pointer;
    text-align: center;
    text-decoration: none;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .score-bar {
    display: flex;
    gap: 2px;
    margin-top: 4px;
    height: 4px;
  }
  .score-bar div { flex: 1; border-radius: 2px; background: var(--panel-hi); }
  .score-bar div.filled { background: var(--accent); }
  .empty {
    padding: 80px 32px;
    text-align: center;
    color: var(--text-dim);
    grid-column: 1 / -1;
  }
  .empty h2 { color: var(--text); }
  #loadingState {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🔍 Garimpo Viral</h1>
    <div class="sub">Vídeos virais recentes de canais dark — sem API do YouTube</div>
  </div>
  <div class="meta">
    <a href="copiloto.html" style="display:inline-block;background:#7c5cff;color:#fff;padding:8px 14px;border-radius:6px;text-decoration:none;font-size:13px;margin-bottom:8px;">🧭 Abrir Copiloto</a>
    <div id="genAt">carregando…</div>
    <div id="totalCount"></div>
  </div>
</header>

<section class="filters">
  <label>
    Nicho
    <select id="niche"><option value="">Todos</option></select>
  </label>
  <label>
    Idioma
    <select id="lang"><option value="">Todos</option></select>
  </label>
  <label>
    Só faceless
    <select id="faceless">
      <option value="">Todos</option>
      <option value="yes">Sim</option>
      <option value="no">Não</option>
    </select>
  </label>
  <label>
    Score mínimo: <span id="scoreVal">0</span>
    <input type="range" id="scoreMin" min="0" max="100" value="0" step="5">
  </label>
  <label>
    Buscar
    <input type="text" id="search" placeholder="título, canal, query…">
  </label>
  <label>
    Ordenar por
    <select id="sort">
      <option value="score">Score (maior)</option>
      <option value="views">Views (mais)</option>
      <option value="velocity">Velocidade (views/dia)</option>
      <option value="recent">Mais recente</option>
    </select>
  </label>
</section>

<main id="grid">
  <div id="loadingState">Carregando dados do garimpador…</div>
</main>

<script>
const DATA_URL = "results.json";
let DATA = null;

function fmtViews(n) {
  if (!n) return "0";
  if (n >= 1e6) return (n/1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n/1e3).toFixed(0) + "k";
  return n.toString();
}
function fmtDuration(sec) {
  if (!sec) return "";
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  const s = Math.floor(sec%60);
  if (h) return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  return `${m}:${s.toString().padStart(2,'0')}`;
}
function fmtUploadDate(d) {
  if (!d || d.length !== 8) return "?";
  return `${d.slice(6,8)}/${d.slice(4,6)}/${d.slice(0,4)}`;
}

function render() {
  if (!DATA) return;
  const nicheVal = document.getElementById('niche').value;
  const langVal = document.getElementById('lang').value;
  const facelessVal = document.getElementById('faceless').value;
  const scoreMin = +document.getElementById('scoreMin').value;
  const search = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sort').value;

  let videos = DATA.videos.slice();
  if (nicheVal) videos = videos.filter(v => v.niche === nicheVal);
  if (langVal) videos = videos.filter(v => v.lang === langVal);
  if (facelessVal === 'yes') videos = videos.filter(v => v.is_faceless);
  if (facelessVal === 'no') videos = videos.filter(v => !v.is_faceless);
  if (scoreMin) videos = videos.filter(v => v.score >= scoreMin);
  if (search) {
    videos = videos.filter(v => {
      return (v.title||'').toLowerCase().includes(search)
          || (v.channel||'').toLowerCase().includes(search)
          || (v.query||'').toLowerCase().includes(search);
    });
  }

  if (sort === 'views') videos.sort((a,b) => (b.view_count||0) - (a.view_count||0));
  else if (sort === 'velocity') videos.sort((a,b) => (b.scoring?.velocity||0) - (a.scoring?.velocity||0));
  else if (sort === 'recent') videos.sort((a,b) => (a.scoring?.video_age_days||999) - (b.scoring?.video_age_days||999));
  else videos.sort((a,b) => b.score - a.score);

  const grid = document.getElementById('grid');
  if (!videos.length) {
    grid.innerHTML = '<div class="empty"><h2>Nada encontrado</h2><p>Ajusta os filtros ou espera a próxima rodada do garimpador.</p></div>';
    return;
  }

  grid.innerHTML = videos.map(v => {
    const score = Math.round(v.score);
    const scoreCls = score >= 70 ? 'hi' : score >= 40 ? 'mid' : '';
    const nicheName = DATA.niches[v.niche] || v.niche;
    const langName = DATA.languages[v.lang] || v.lang;
    const vpd = v.view_count && v.scoring?.video_age_days
      ? Math.round(v.view_count / Math.max(v.scoring.video_age_days, 0.5))
      : 0;
    return `
      <div class="card">
        <div class="thumb">
          <img src="${v.thumbnail||''}" alt="" loading="lazy" onerror="this.style.display='none'">
          ${v.is_faceless ? '<span class="badge-faceless">FACELESS</span>' : ''}
          <span class="badge-score ${scoreCls}">${score}</span>
          <span class="badge-duration">${fmtDuration(v.duration)}</span>
        </div>
        <div class="body">
          <a class="title" href="${v.url}" target="_blank" rel="noopener">${escapeHtml(v.title||'(sem título)')}</a>
          <div class="meta-row">
            <span class="chip-tag">${escapeHtml(nicheName)}</span>
            <span class="chip-tag">${escapeHtml(langName)}</span>
            <span class="chip-tag">${fmtUploadDate(v.upload_date)}</span>
          </div>
          <div class="stats">
            <span class="views">👁 ${fmtViews(v.view_count)}</span>
            <span>🚀 ${fmtViews(vpd)}/dia</span>
            <span>👍 ${fmtViews(v.like_count)}</span>
          </div>
          <div class="stats">
            <a href="${v.channel_url||'#'}" target="_blank" rel="noopener" style="color:var(--text-dim); text-decoration:none;">📺 ${escapeHtml(v.channel||'?')}</a>
            <span>${fmtViews(v.channel_followers)} subs</span>
          </div>
          <div class="actions">
            <a class="btn" href="${v.url}" target="_blank" rel="noopener">Abrir vídeo</a>
            <button class="btn" onclick="copyTitle('${encodeURIComponent(v.title||'')}')">📋 Título</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function copyTitle(encoded) {
  navigator.clipboard.writeText(decodeURIComponent(encoded));
}

async function load() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    DATA = await res.json();
    document.getElementById('genAt').textContent = 'Atualizado: ' + new Date(DATA.generated_at).toLocaleString('pt-BR');
    document.getElementById('totalCount').textContent = DATA.total + ' vídeos garimpados';

    const nicheSel = document.getElementById('niche');
    Object.entries(DATA.niches).forEach(([k,v]) => {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = v;
      nicheSel.appendChild(opt);
    });
    const langSel = document.getElementById('lang');
    Object.entries(DATA.languages).forEach(([k,v]) => {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = v;
      langSel.appendChild(opt);
    });
    render();
  } catch(e) {
    document.getElementById('grid').innerHTML =
      '<div class="empty"><h2>Erro ao carregar</h2><p>Aguarde a primeira rodada do garimpador completar.</p></div>';
  }
}

document.getElementById('niche').addEventListener('change', render);
document.getElementById('lang').addEventListener('change', render);
document.getElementById('faceless').addEventListener('change', render);
document.getElementById('sort').addEventListener('change', render);
document.getElementById('search').addEventListener('input', render);
document.getElementById('scoreMin').addEventListener('input', e => {
  document.getElementById('scoreVal').textContent = e.target.value;
  render();
});

load();
</script>
</body>
</html>
