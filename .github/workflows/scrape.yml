name: Garimpo Viral — scrape & publish

on:
  schedule:
    - cron: '0 */6 * * *'   # a cada 6 horas (UTC)
  workflow_dispatch:          # permite rodar manualmente pelo site do GitHub
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/scrape.yml'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python src/scraper.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated results
        run: |
          # Guard: não commitar se YouTube bloqueou (0 vídeos achados)
          TOTAL=$(python3 -c "import json; print(json.load(open('data/results.json'))['total'])")
          if [ "$TOTAL" -eq 0 ]; then
            echo "⚠ 0 vídeos achados (provável bloqueio YT do IP GH Actions). Pulando commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/results.json docs/results.json
          if git diff --cached --quiet; then
            echo "Nenhuma mudança, pulando commit."
          else
            git commit -m "chore: atualiza garimpagem $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
